<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/storageflow.css">
  <title>StorageFlow - Users Management</title>
</head>
<body>
  <header></header>

  <div class="layout">
    <nav class="sidebar"></nav>

    <main class="content">
      <h2 id="PageTitle"></h2>
      <div class="admin-notice" id="AdminNotice"></div>
      <p id="Intro"></p>

      <!-- User information -->
      <details>
        <summary><h3 id="HeadingUserInfo"></h3></summary>

        <div class="field">
          <div class="field-name" id="LabelUserID"></div>
          <p id="UserID"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelFullName"></div>
          <p id="FullName"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelLoginName"></div>
          <p id="LoginName"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelPassword"></div>
          <p id="Password"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelHint"></div>
          <p id="Hint"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelLanguage"></div>
          <p id="Language"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelNote"></div>
          <p id="Note"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelRole"></div>
          <p id="Role"></p>
        </div>
      </details>

      <!-- Controls -->
      <details>
        <summary><h3 id="HeadingControls"></h3></summary>

        <div class="field">
          <div class="field-name" id="LabelNew"></div>
          <p id="New"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelLanguageBtn"></div>
          <p id="LanguageBtn"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelGrid"></div>
          <p id="Grid"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelDelete"></div>
          <p id="Delete"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelSave"></div>
          <p id="Save"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelExit"></div>
          <p id="Exit"></p>
        </div>
      </details>
    </main>
  </div>

  <script src="js/shared-header.js"></script>
  <script src="js/shared-nav.js"></script>
  <script src="js/storageflow-LibEn.js"></script>
  <script src="js/storageflow-LibFr.js"></script>
  <script src="js/7-users-management-en.js"></script>
  <script src="js/7-users-management-fr.js"></script>
  <script src="js/storageflow-script.js"></script>
</body>
</html>
