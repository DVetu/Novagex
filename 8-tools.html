<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/storageflow.css">
  <title>StorageFlow - Tools</title>
</head>
<body>
  <header></header>

  <div class="layout">
    <nav class="sidebar"></nav>

    <main class="content">
      <h2 id="PageTitle"></h2>
      <div class="admin-notice" id="AdminNotice"></div>
      <p id="Intro"></p>

      <details>
        <summary><h3 id="HeadingBackup"></h3></summary>
        <div class="field">
          <div class="field-name" id="LabelBackupBtn"></div>
          <p id="BackupBtn"></p>
        </div>
      </details>

      <details>
        <summary><h3 id="HeadingFindReplace"></h3></summary>
        <div class="field">
          <div class="field-name" id="LabelSearchIn"></div>
          <p id="SearchIn"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelColumn"></div>
          <p id="Column"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelFind"></div>
          <p id="Find"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelReplaceWith"></div>
          <p id="ReplaceWith"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelResultsGrid"></div>
          <p id="ResultsGrid"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelClearBtn"></div>
          <p id="ClearBtn"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelReplaceBtn"></div>
          <p id="ReplaceBtn"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelLanguageBtn"></div>
          <p id="LanguageBtn"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelExitBtn"></div>
          <p id="ExitBtn"></p>
        </div>
      </details>
    </main>
  </div>

  <script src="js/shared-header.js"></script>
  <script src="js/shared-nav.js"></script>
  <script src="js/storageflow-LibEn.js"></script>
  <script src="js/storageflow-LibFr.js"></script>
  <script src="js/8-tools-en.js"></script>
  <script src="js/8-tools-fr.js"></script>
  <script src="js/storageflow-script.js"></script>
</body>
</html>
