<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/storageflow.css">
  <title>StorageFlow - Lists Management</title>
</head>
<body>
  <header></header>

  <div class="layout">
    <nav class="sidebar"></nav>

    <main class="content">
      <h2 id="PageTitle"></h2>
      <div class="admin-notice" id="AdminNotice"></div>
      <p id="Intro"></p>

      <details>
        <summary><h3 id="HeadingLists"></h3></summary>
        <div class="field">
          <div class="field-name" id="LabelListSelector"></div>
          <p id="ListSelector"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelItems"></div>
          <p id="Items"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelReloadBtn"></div>
          <p id="ReloadBtn"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelSaveBtn"></div>
          <p id="SaveBtn"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelLanguageBtn"></div>
          <p id="LanguageBtn"></p>
        </div>
        <div class="field">
          <div class="field-name" id="LabelExitBtn"></div>
          <p id="ExitBtn"></p>
        </div>
      </details>
    </main>
  </div>

  <script src="js/shared-header.js"></script>
  <script src="js/shared-nav.js"></script>
  <script src="js/storageflow-LibEn.js"></script>
  <script src="js/storageflow-LibFr.js"></script>
  <script src="js/9-lists-management-en.js"></script>
  <script src="js/9-lists-management-fr.js"></script>
  <script src="js/storageflow-script.js"></script>
</body>
</html>
