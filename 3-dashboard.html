<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/storageflow.css">
  <title>StorageFlow - Login & Dashboard</title>
</head>
<body>
  <header></header>

  <div class="layout">
    <nav class="sidebar"></nav>

    <main class="content">
      <h2 id="PageTitle"></h2>
      <details>
        <summary><h3 id="HeadingDashboard"></h3></summary>
        <p id="DashboardIntro"></p>

        <div class="field">
          <div class="field-name" id="LabelColourMode"></div>
          <p id="ColourMode"></p>
        </div>

        <div class="field">
          <div class="field-name" id="LabelDashLanguageBtn"></div>
          <p id="DashLanguageBtn"></p>
        </div>

        <div class="field">
          <div class="field-name" id="LabelMySettings"></div>
          <p id="MySettings"></p>
        </div>

        <div class="admin-notice" id="AdminNotice"></div>

        <div class="field">
          <div class="field-name" id="LabelUsersManagement"></div>
          <p id="UsersManagement"></p>
        </div>

        <div class="field">
          <div class="field-name" id="LabelStorageManagement"></div>
          <p id="StorageManagement"></p>
        </div>

        <div class="field">
          <div class="field-name" id="LabelReports"></div>
          <p id="Reports"></p>
        </div>

        <div class="field">
          <div class="field-name" id="LabelHelp"></div>
          <p id="Help"></p>
        </div>

        <div class="field">
          <div class="field-name" id="LabelAbout"></div>
          <p id="About"></p>
        </div>

        <div class="field">
          <div class="field-name" id="LabelStatusBar"></div>
          <p id="StatusBar"></p>
        </div>

        <div class="field">
          <div class="field-name" id="LabelExitDash"></div>
          <p id="ExitDash"></p>
        </div>
      </details>
    </main>
  </div>

  <script src="js/shared-header.js"></script>
  <script src="js/shared-nav.js"></script>
  <script src="js/storageflow-LibEn.js"></script>
  <script src="js/storageflow-LibFr.js"></script>
  <script src="js/3-dashboard-en.js"></script>
  <script src="js/3-dashboard-fr.js"></script>
  <script src="js/storageflow-script.js"></script>
</body>
</html>
